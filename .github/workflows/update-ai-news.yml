name: Deploy AI News to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare OPML (optional)
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          else
            echo "No FOLLOW_OPML_B64 secret provided; RSS OPML is optional"
          fi

      - name: Update data
        run: pnpm run fetch
        continue-on-error: true

      - name: Generate OPML JSON
        run: npx tsx src/generate-opml-json.ts || true

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions-bot"
          git config user.email "41898282+github-actions-bot@users.noreply.github.com"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            git commit -m "chore: update ai news snapshot [skip ci]"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes committed and pushed"
          fi

      - name: Build web
        env:
          GITHUB_PAGES: true
        run: |
          cd web
          pnpm install --no-frozen-lockfile
          pnpm run build
          mkdir -p dist/data
          cp ../data/latest-24h.json dist/data/ 2>/dev/null || true
          cp ../data/latest-7d.json dist/data/ 2>/dev/null || true
          cp ../data/source-status.json dist/data/ 2>/dev/null || true
          cp ../data/opml-feeds.json dist/data/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    if: always()
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
